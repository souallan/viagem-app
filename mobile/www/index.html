<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>RoteiroApp</title>
    <style>
      html, body {
        margin: 0; height: 100%;
        background: #0E1520; color: #E2E8F0;
        font-family: -apple-system, system-ui, sans-serif;
        display: flex; align-items: center; justify-content: center;
      }
      .box { text-align: center; padding: 24px; }
      .logo {
        width: 72px; height: 72px; border-radius: 18px; margin: 0 auto 16px;
        background: linear-gradient(135deg, #1A5FCC 0%, #2570E8 100%);
        display: flex; align-items: center; justify-content: center;
      }
      .spin {
        width: 26px; height: 26px; margin: 18px auto 0;
        border: 3px solid rgba(255,255,255,.15); border-top-color: #5585FA;
        border-radius: 50%; animation: r 0.9s linear infinite;
      }
      @keyframes r { to { transform: rotate(360deg); } }
      h1 { font-size: 18px; font-weight: 700; margin: 0; }
      p { color: #94A3B8; font-size: 13px; margin: 6px 0 0; }
    </style>
  </head>
  <body>
    <!-- Tela de abertura/fallback do app nativo. O conteúdo real é carregado
         de server.url (roteiroapp.com). Mostrada no cold start e se estiver offline. -->
    <div class="box">
      <div class="logo">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
        </svg>
      </div>
      <h1>RoteiroApp</h1>
      <p>Carregando suas viagens…</p>
      <div class="spin"></div>
    </div>
  </body>
</html>
