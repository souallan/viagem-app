<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" fill="none">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A5FCC"/>
      <stop offset="100%" stop-color="#2570E8"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>

  <!-- Icon box: 48x48, centered vertically in 64px height → y=8 -->
  <rect x="0" y="8" width="48" height="48" rx="11" fill="url(#iconBg)"/>
  <!-- Subtle top sheen on icon -->
  <rect x="0" y="8" width="48" height="22" rx="11" fill="white" opacity="0.07"/>

  <!-- Airplane inside icon box (path in 24-space, scale=2, centered in 48px box → tx=(48-24*2)/2=0, ty=8+(48-24*2)/2=8) -->
  <g transform="translate(0,8) scale(2)">
    <path
      d="M16 3 L17.8 10.5 L25 14 L25 15.8 L17.8 14 L17.8 20.5 L20.5 22 L16 23.5 L11.5 22 L14.2 20.5 L14.2 14 L7 15.8 L7 14 L14.2 10.5 Z"
      fill="white"
    />
  </g>

  <!-- Wordmark: "Roteiro" in white + "App" in amber -->
  <text
    x="60" y="38"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="700" letter-spacing="-0.5"
    fill="white">Roteiro</text>
  <text
    x="185" y="38"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="700" letter-spacing="-0.5"
    fill="#f59e0b">App</text>

  <!-- Tagline -->
  <text
    x="60" y="54"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="9" font-weight="500" letter-spacing="2.2"
    fill="rgba(255,255,255,0.38)">TRAVEL PLANNER</text>
</svg>
