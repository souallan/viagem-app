<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A5FCC"/>
      <stop offset="100%" stop-color="#2570E8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0a2f6e" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Inner glow -->
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>

  <!-- Airplane silhouette (top-down, pointing up), scaled to ~300px centered -->
  <!-- Path origin is 24x24, scale=300/24=12.5, visual center at (16,13.25)→(200,165.6), offset to (256,256): tx=56, ty=90 -->
  <g transform="translate(56,88) scale(12.5)" filter="url(#shadow)">
    <path
      d="M16 3 L17.8 10.5 L25 14 L25 15.8 L17.8 14 L17.8 20.5 L20.5 22 L16 23.5 L11.5 22 L14.2 20.5 L14.2 14 L7 15.8 L7 14 L14.2 10.5 Z"
      fill="white"
    />
  </g>
</svg>
