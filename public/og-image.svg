<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070d14"/>
      <stop offset="100%" style="stop-color:#0e1a2e"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A5FCC"/>
      <stop offset="100%" style="stop-color:#2570E8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo box -->
  <rect x="80" y="80" width="72" height="72" rx="16" fill="url(#btn)"/>
  <text x="116" y="130" font-size="36" text-anchor="middle" fill="white">✈</text>

  <!-- App name -->
  <text x="170" y="108" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="white">Roteiro</text>
  <text x="310" y="108" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#f59e0b">App</text>
  <text x="170" y="130" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="3">TRAVEL PLANNER</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Arial,sans-serif" font-size="64" font-weight="900" fill="white">Planeje viagens</text>
  <text x="80" y="340" font-family="Arial,sans-serif" font-size="64" font-weight="900" fill="white">com facilidade</text>

  <!-- Subtitle -->
  <text x="80" y="400" font-family="Arial,sans-serif" font-size="24" fill="rgba(255,255,255,0.55)">Roteiros · Orçamento · Documentos · Comunidade</text>

  <!-- CTA pill -->
  <rect x="80" y="440" width="260" height="52" rx="26" fill="url(#btn)"/>
  <text x="210" y="472" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">Comece grátis →</text>

  <!-- Domain -->
  <text x="1120" y="590" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="end">roteiroapp.com</text>

  <!-- Decorative circles -->
  <circle cx="950" cy="315" r="180" fill="none" stroke="rgba(37,112,232,0.12)" stroke-width="1"/>
  <circle cx="950" cy="315" r="260" fill="none" stroke="rgba(37,112,232,0.07)" stroke-width="1"/>
  <circle cx="950" cy="315" r="80" fill="rgba(37,112,232,0.08)"/>
  <text x="950" y="330" font-size="60" text-anchor="middle" fill="rgba(255,255,255,0.15)">✈</text>
</svg>
