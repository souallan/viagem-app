name: Update CLAUDE.md

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CLAUDE.md'
      - '.github/**'

jobs:
  update-claude-md:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate CLAUDE.md from project structure
        run: python3 .github/scripts/generate-claude-md.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          git diff --staged --quiet && echo "No changes to CLAUDE.md" || \
            (git commit -m "docs: auto-update CLAUDE.md [skip ci]" && git push)
